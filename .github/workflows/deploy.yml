name: Deploy Next.js to Ubuntu Docker

on:
  push:
    branches:
      - main  # 当推送到 main 分支时触发（如果是 master 请自行修改）

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 这里的路径替换为你服务器上项目的实际路径
            cd ~/app/lottery_tools 
            
            # 拉取最新代码
            git pull origin main
            
            # 重新构建并启动 Docker 容器 (假设你使用 docker-compose)
            docker compose down
            docker compose up -d --build
            
            # 如果你使用的是原生 docker 命令，可以替换为：
            # docker stop next-app || true
            # docker rm next-app || true
            # docker build -t next-app-image .
            # docker run -d -p 3000:3000 --name next-app next-app-image